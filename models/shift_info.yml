# Shift information model: map Google Calendar event titles to Amplify
# need IDs. Each category holds its shift configuration (need IDs, slots,
# timing) plus the list of title keywords ('aliases') that map to it.
# To add a new team or event, add its keyword to the relevant category's
# 'aliases' list. When a title matches more than one alias, the longest
# alias wins.

# Amplify need ID reference
## 607810: Junior Scrimmages - SOs
## 607934: Adult Scrimmages - SOs
## 628861: Adult Scrimmages - NSOs
## 628862: Junior Scrimmages - NSOs
## 773454: Adult Officiating Practices
## 868881: Junior Officiating Practices
## 879609: Adult Games - NSOs
## 879610: Adult Games - SOs
## 892230: Adult Officiating Practices Coaches
## 905196: Junior Games - NSOs
## 905197: Junior Games - SOs
## 968727: Junior Officiating Practices Coaches

---
calendar:

  # ----- 'Events' calendar (games) ----- #
  events:
    description: Calendar with game information
    categories:

      adult_game:
        description: Adult Games
        group: adults
        initiative: officiating
        type: game
        aliases: [aoa, axles, bb, gnr, hh, hr, woj, wheels, justice, wreckers]
        need_ids:
          - description: NSOs
            id: 879609
            max_length: 165
            offset_start: 15
            offset_end: 30
            slots: 12
          - description: SOs
            id: 879610
            max_length: 165
            offset_start: 15
            offset_end: 30
            slots: 8

      junior_game_petals:
        description: Rose Petals Games
        group: juniors
        initiative: officiating
        type: game
        aliases: [petals, ptt]
        need_ids:
          - description: NSOs
            id: 905196
            max_length: 135
            offset_start: -15
            offset_end: 30
            slots: 12
          - description: SOs
            id: 905197
            max_length: 135
            offset_start: -15
            offset_end: 30
            slots: 8

      junior_game_buds:
        description: Rose Buds HT Games
        group: juniors
        initiative: officiating
        type: game
        aliases: [buds, roses, rtt, ntt]
        need_ids:
          - description: NSOs
            id: 905196
            max_length: 165
            offset_start: 0
            offset_end: 75
            slots: 12
          - description: SOs
            id: 905197
            max_length: 165
            offset_start: 0
            offset_end: 75
            slots: 8

      junior_game_buds_closed:
        description: Rose Buds Closed Scored Scrimmage
        group: juniors
        initiative: officiating
        type: game
        aliases: ['buds closed scored scrimmage']
        need_ids:
          - description: NSOs
            id: 905196
            max_length: 165
            offset_start: -30
            offset_end: 15
            slots: 12
          - description: SOs
            id: 905197
            max_length: 165
            offset_start: -30
            offset_end: 15
            slots: 8

      junior_game:
        description: Juniors Games - Unspecified
        group: juniors
        initiative: officiating
        type: game
        aliases: [juniors]
        need_ids:
          - description: NSOs
            id: 905196
            max_length: 165
            offset_start: 15
            offset_end: 30
            slots: 12
          - description: SOs
            id: 905197
            max_length: 165
            offset_start: 15
            offset_end: 30
            slots: 8

    # Fallback when no alias matches: empty IDs signal 'operator must review'.
    default:
      description: Unknown Game
      group: null
      initiative: officiating
      type: game
      need_ids:
        - description: NSOs
          id: ''
          max_length: 165
          offset_start: 0
          offset_end: 0
          slots: 12
        - description: SOs
          id: ''
          max_length: 165
          offset_start: 0
          offset_end: 0
          slots: 8

  # ----- 'Practices' calendar (scrimmages and practices) ----- #
  practices:
    description: Calendar with scrimmages and practices information
    categories:

      adult_scrimmage:
        description: Adult Scrimmages
        group: adults
        initiative: officiating
        type: scrimmage
        aliases:
          - 'adult scrimmage'
          - 'woj scrimmage'
          - 'wreckers scrimmage'
          - wreckers
        need_ids:
          - description: NSOs
            id: 628861
            max_length: null
            offset_start: 0
            offset_end: 0
            slots: 20
          - description: SOs
            id: 607934
            max_length: null
            offset_start: 0
            offset_end: 0
