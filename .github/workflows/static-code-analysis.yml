---
# Perform static code analysis

# Name of the action
name: Static Code Analysis

# Events that trigger the action
on:
  push:
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on a branch; never cancel main runs so the
# post-merge run (and status badges) always complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  static_code_analysis:
    name: Static code analysis
    # Same-repo pushes are already covered by the 'push' event, so only
    # run the pull_request event for forks (their branches are not in
    # this repo and so never trigger 'push').
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest

    steps:
      # checkout action documentation
      # https://github.com/marketplace/actions/checkout
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Fetch all history for all branches and tags
          fetch-depth: 0

      # setup-python action documentation
      # https://github.com/marketplace/actions/setup-python
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # Install static code analysis packages
      - name: Install static code analysis packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade -r \
            requirements/requirements_static_code_analysis.txt

      # Python static code analysis with bandit
      - name: Python static code analysis
        run: |
          bandit -rc .bandit.yml .
