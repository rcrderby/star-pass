---
# Perform linting with GitHub Super Linter
## https://github.com/super-linter/super-linter

# Name of the action
name: Super Linter

# Events that trigger the action
on:
  push:
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on a branch; never cancel main runs so the
# post-merge run (and status badges) always complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint_repository:
    name: Lint repository files
    # Same-repo pushes are already covered by the 'push' event, so only
    # run the pull_request event for forks (their branches are not in
    # this repo and so never trigger 'push').
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest

    # Job permissions
    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      # checkout action documentation
      # https://github.com/marketplace/actions/checkout
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Fetch all history for all branches and tags
          fetch-depth: 0

      # Super Linter action documentation
      # https://github.com/marketplace/actions/super-linter
      - name: Super Linter
        uses: super-linter/super-linter@v8
        # Configuration settings
        env:
          # Report status checks
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Specify languages to lint
          VALIDATE_DOCKERFILE_HADOLINT: true
          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_GITLEAKS: true
          VALIDATE_JSCPD: true
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: true
          VALIDATE_NATURAL_LANGUAGE: true
          VALIDATE_PYTHON_FLAKE8: true
          VALIDATE_PYTHON_PYLINT: true
          VALIDATE_SHELL_SHFMT: true
          VALIDATE_YAML: true
          # Language-specific configuration
          YAML_ERROR_ON_WARNING: true
          # Exclusions
          FILTER_REGEX_EXCLUDE: .*\.devcontainer/devcontainer\.json$
