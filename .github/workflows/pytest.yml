---
# This action performs pytest testing with coverage reporting

# Name of the action
name: pytest Testing

# Events that trigger the action
on:
  push:
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on a branch; never cancel main runs so the
# post-merge run (and status badges) always complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  pytest:
    name: pytest
    # Same-repo pushes are already covered by the 'push' event, so only
    # run the pull_request event for forks (their branches are not in
    # this repo and so never trigger 'push').
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest

    # Set environment variables
    env:
      PYTHONPATH: ./

    steps:
      # checkout action documentation
      # https://github.com/marketplace/actions/checkout
      - name: Checkout repository
        uses: actions/checkout@v6

      # Set PYTHONPATH environment variable
      - name: Set PYTHONPATH environment variable
        run: |
          export PYTHONPATH=$PYTHONPATH:${{ env.PYTHONPATH }}

      # Install pytest packages
      - name: Install pytest packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade -r \
            requirements/requirements_pytest.txt

      # Perform pytest testing and coverage analysis
      - name: pytest
        run: |
          pytest --verbose --cov-report='term-missing' --cov='.'
